name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build with Gradle
      id: gradle-build
      env:
        GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon --no-build-cache --stacktrace 2>&1 | tail -50
        # 即使失败也保留输出

    - name: Check APK exists
      id: check-apk
      run: |
        echo "Checking for APK files..."
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory found"
        find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
        if ! find app/build/outputs -name "*.apk" | grep -q .; then
          echo "ERROR: No APK files produced by build!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: xvj-apk
        path: app/build/outputs/**/*.apk
