name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Build with Gradle
      id: gradle-build
      run: |
        chmod +x gradlew
        mkdir -p build-logs
        # Use script file + separate status capture so PIPESTATUS gives Gradle exit code
        cat > gradle_build.sh << 'SCRIPT'
        #!/bin/bash
        set -o pipefail
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-logs/gradle-output.log
        echo "GRADLE_EXIT=$?"
        SCRIPT
        bash gradle_build.sh
        GRADLE_CODE=${PIPESTATUS[0]}
        echo "BUILD_EXIT_CODE=$GRADLE_CODE" >> $GITHUB_ENV
        echo "Gradle exit code: $GRADLE_CODE"
    
    - name: Upload build logs on failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-logs
        path: build-logs/gradle-output.log
        retention-days: 3
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: xvj-apk
        path: app/build/outputs/apk/debug/app-debug.apk
